<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANON v6.0 DIAGNOSTIC</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #111; color: #fff; padding-top: 10px; }
        .btn { border: none; padding: 20px; font-size: 18px; border-radius: 12px; color: white; width: 90%; margin: 8px; font-weight: bold; }
        .log-box { font-size: 12px; background: #000; color: #0f0; text-align: left; height: 120px; overflow: scroll; margin: 10px; padding: 10px; border: 1px solid #333; }
    </style>
</head>
<body>
    <h3>ANON v6.0 DIAGNOSTIC</h3>
    <button onclick="DeviceOrientationEvent.requestPermission()" class="btn" style="background:#007aff">1. センサー有効化</button>
    <button id="connect" class="btn" style="background:#ff9500">2. ANONに接続</button>
    
    <div style="font-size: 24px; margin: 15px;">P: <span id="pitch">0</span> | R: <span id="roll">0</span></div>
    <div id="log" class="log-box">> System Ready<br></div>

    <script>
        const SVC = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const TX = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        let txChar = null;

        function logger(m) { 
            const l = document.getElementById('log');
            l.innerHTML += "> " + m + "<br>";
            l.scrollTop = l.scrollHeight;
        }

        window.addEventListener('deviceorientation', (e) => {
            let p = Math.max(-10, Math.min(10, Math.round((e.beta||0)*(10/30))));
            let r = Math.max(-10, Math.min(10, Math.round((e.gamma||0)*(10/20))));
            document.getElementById('pitch').innerText = p;
            document.getElementById('roll').innerText = r;

            if (txChar && (p !== 0 || r !== 0)) {
                const data = new TextEncoder().encode(p + "," + r + "\n");
                txChar.writeValueWithoutResponse(data)
                    .then(() => { /* 送信成功 */ })
                    .catch(err => logger("Send Error: " + err));
            }
        });

        document.getElementById('connect').onclick = async () => {
            try {
                logger("Searching for micro:bit...");
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [SVC]
                });
                logger("Connecting to device...");
                const server = await device.gatt.connect();
                logger("Searching UART Service...");
                const service = await server.getPrimaryService(SVC);
                logger("Finding TX Channel...");
                txChar = await service.getCharacteristic(TX);
                
                logger("【LINK SUCCESS】Ready to roll!");
                alert("ANON リンク完了！");
            } catch (e) { 
                logger("Error: " + e);
                alert("Connection Failed: " + e);
            }
        };
    </script>
</body>
</html>
