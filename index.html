<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANON v3.4 DEBUGGER</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 10px; }
        .btn { border: none; padding: 15px; font-size: 16px; border-radius: 10px; color: white; font-weight: bold; margin: 5px; width: 90%; }
        #permissionBtn { background: #007aff; }
        #connectBtn { background: #ff9500; }
        #testBtn { background: #5cb85c; }
        .log-box { font-size: 10px; margin: 10px; padding: 10px; background: #000; border-radius: 5px; color: #0f0; text-align: left; height: 180px; overflow-y: scroll; font-family: monospace; border: 1px solid #333; }
        .indicator { width: 15px; height: 15px; background: #333; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <h3>ANON FINAL DEBUG v3.4</h3>
    
    <button id="permissionBtn" class="btn">1. センサー有効化</button>
    <button id="connectBtn" class="btn">2. ANON接続 (UART探索)</button>
    <button id="testBtn" class="btn">3. 強制送信テスト</button>

    <div style="font-size: 18px; margin: 10px;">P: <span id="pitch">0</span> | R: <span id="roll">0</span></div>
    
    <div id="log" class="log-box">--- DEBUG LOG ---<br></div>

    <script>
        // micro:bit UART UUIDs
        const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const UART_RX_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e"; // Phone -> micro:bit
        
        let txChar = null;

        function logger(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += "> " + msg + "<br>";
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        // センサー
        document.getElementById('permissionBtn').onclick = () => {
            DeviceOrientationEvent.requestPermission().then(res => {
                if(res === 'granted') {
                    logger("センサー許可OK");
                    window.addEventListener('deviceorientation', (e) => {
                        let p = Math.max(-10, Math.min(10, Math.round((e.beta || 0) * (10 / 30))));
                        let r = Math.max(-10, Math.min(10, Math.round((e.gamma || 0) * (10 / 20))));
                        document.getElementById('pitch').innerText = p;
                        document.getElementById('roll').innerText = r;
                        if(txChar) send(p + "," + r + "\n");
                    });
                }
            });
        };

        // Bluetooth接続
        document.getElementById('connectBtn').onclick = async () => {
            try {
                logger("探索開始...");
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [UART_SERVICE_UUID]
                });
                
                logger("GATT接続中...");
                const server = await device.gatt.connect();
                
                logger("UARTサービス検索...");
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                
                logger("RX窓口(0002)を検索...");
                txChar = await service.getCharacteristic(UART_RX_CHAR_UUID);
                
                logger("【成功】送信準備完了！");
                alert("リンク成功！");
            } catch (e) {
                logger("エラー: " + e.name + " - " + e.message);
                alert("失敗: " + e.message);
            }
        };

        // 送信関数
        async function send(msg) {
            if (!txChar) return;
            try {
                const data = new TextEncoder().encode(msg);
                // writeValueWithoutResponseの方が高速で安定する場合があります
                await txChar.writeValueWithoutResponse(data);
            } catch (e) {
                logger("送信失敗: " + e.message);
                txChar = null; // エラー時はリセット
            }
        }

        document.getElementById('testBtn').onclick = () => {
            if(!txChar) { logger("未接続です"); return; }
            logger("テストデータ送信...");
            send("5,0\n");
            setTimeout(() => send("0,0\n"), 1000);
        };
    </script>
</body>
</html>
