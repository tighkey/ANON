<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANON v3.7</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; }
        .btn { border: none; padding: 20px; font-size: 18px; border-radius: 12px; color: white; width: 90%; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h3>ANON v3.7</h3>
    <button id="p" class="btn" style="background:#007aff">1. センサー許可</button>
    <button id="c" class="btn" style="background:#ff9500">2. ANONに接続</button>
    <div style="font-size: 30px; margin: 20px;">P: <span id="pitch">0</span></div>
    
    <script>
        const SVC = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const RX = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        let tx = null;

        document.getElementById('p').onclick = () => {
            DeviceOrientationEvent.requestPermission().then(res => { if(res==='granted') start(); });
        };

        function start() {
            window.addEventListener('deviceorientation', (e) => {
                let valP = Math.max(-10, Math.min(10, Math.round((e.beta || 0) * (10/30))));
                let valR = Math.max(-10, Math.min(10, Math.round((e.gamma || 0) * (10/20))));
                document.getElementById('pitch').innerText = valP;
                if(tx) {
                    const data = new TextEncoder().encode(valP + "," + valR + "\n");
                    // 応答を待たずに投げっぱなす（これが一番安定します）
                    tx.writeValueWithoutResponse(data).catch(err => console.log(err));
                }
            });
        }

        document.getElementById('c').onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [SVC]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SVC);
                tx = await service.getCharacteristic(RX);
                alert("リンク完了！");
            } catch (e) { alert("接続エラー: " + e); }
        };
    </script>
</body>
</html>
