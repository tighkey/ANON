<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANON v4.5</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #111; color: #fff; padding-top: 20px; }
        .btn { border: none; padding: 25px; font-size: 20px; border-radius: 15px; color: white; width: 90%; margin: 10px; font-weight: bold; }
        .val { font-size: 40px; margin: 20px; font-family: monospace; }
    </style>
</head>
<body>
    <h3>ANON COMMANDER v4.5</h3>
    <button id="p" class="btn" style="background:#007aff">1. センサー有効化</button>
    <button id="c" class="btn" style="background:#ff9500">2. ANONに接続</button>
    <div class="val" id="out">0, 0</div>

    <script>
        const SVC = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const TX = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        let tx = null;

        document.getElementById('p').onclick = () => {
            DeviceOrientationEvent.requestPermission().then(res => { if(res==='granted') start(); });
        };

        function scale(angle, deadzone, max) {
            const abs = Math.abs(angle);
            if (abs <= deadzone) return 0;
            let v = (abs - deadzone) * (10 / (max - deadzone));
            return Math.round(Math.min(10, v) * (angle >= 0 ? 1 : -1));
        }

        function start() {
            window.addEventListener('deviceorientation', (e) => {
                let pitch = scale(e.beta || 0, 2, 30); // 前後: DZ 2, Max 30
                let roll = scale(e.gamma || 0, 3, 20); // 左右: DZ 3, Max 20
                document.getElementById('out').innerText = pitch + ", " + roll;
                if(tx) {
                    const data = new TextEncoder().encode(pitch + "," + roll + "\n");
                    tx.writeValueWithoutResponse(data).catch(()=>{});
                }
            });
        }

        document.getElementById('c').onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [SVC]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SVC);
                tx = await service.getCharacteristic(TX);
                alert("ANON リンク完了！");
            } catch (e) { alert("Error: " + e); }
        };
    </script>
</body>
</html>
