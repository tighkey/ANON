<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANON v5.0 Final</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #111; color: white; padding-top: 20px; overflow: hidden; }
        .btn { border: none; padding: 25px; font-size: 20px; border-radius: 15px; color: white; font-weight: bold; width: 90%; margin: 10px; }
        .val-display { font-size: 48px; font-family: monospace; margin: 30px 0; color: #0f0; }
        .status { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h2>ANON COMMANDER v5.0</h2>
    <button onclick="DeviceOrientationEvent.requestPermission()" class="btn" style="background:#007aff">1. センサー許可</button>
    <button id="connect" class="btn" style="background:#ff9500">2. ANONに接続</button>
    
    <div class="val-display" id="out">0, 0</div>
    <div id="st" class="status">Disconnected</div>

    <script>
        const SVC = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const TX = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        let txChar = null;

        function calc(angle, dz, max) {
            const abs = Math.abs(angle);
            if (abs <= dz) return 0;
            // デッドゾーンを起点に 0〜10 へスケーリング
            let v = (abs - dz) * (10 / (max - dz));
            v = Math.min(10, v);
            return Math.round(v * (angle >= 0 ? 1 : -1));
        }

        window.addEventListener('deviceorientation', (e) => {
            let p = calc(e.beta || 0, 2, 30);  // 前後: 30度で10
            let r = calc(e.gamma || 0, 3, 20); // 左右: 20度で10
            document.getElementById('out').innerText = p + ", " + r;

            if (txChar) {
                const cmd = p + "," + r + "\n";
                txChar.writeValueWithoutResponse(new TextEncoder().encode(cmd)).catch(()=>{});
            }
        });

        document.getElementById('connect').onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [SVC]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SVC);
                txChar = await service.getCharacteristic(TX);
                document.getElementById('st').innerText = "CONNECTED";
                alert("ANON リンク完了！");
            } catch (e) { alert("Error: " + e); }
        };
    </script>
</body>
</html>
